
  # ENFORCEMENT — second scan with table format.
  # Reason: SARIF format exits on any finding regardless of severity filter.
  # Separating reporting (SARIF) from enforcement (table) allows full
  # visibility in the Security tab while blocking only HIGH/CRITICAL.
name: security-scan
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read          # Required to checkout and read repo files
      security-events: write  # Required to upload SARIF files to Security tab
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: scan-image
        id: scan-image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'falcosecurity/falco'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: scan-manifest
        id: scan-manifest
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          hide-progress: true
          format: 'sarif'
          output: 'trivy-man-results.sarif'
      - name: Upload Trivy report scan image
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy-image
      - name: Upload Trivy report scan manifest
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-man-results.sarif'
          category: trivy-manifest
      - name: scan-image-enforce
        id: scan-image-enforce
        uses: aquasecurity/trivy-action@0.35.0
        with:
           image-ref: 'falcosecurity/falco'
           format: 'table'
           severity: 'HIGH,CRITICAL'
           exit-code: '1'
      - name: scan-manifest-enforce
        id: scan-man-enforce
        uses: aquasecurity/trivy-action@0.35.0
        with:
           scan-type: 'config'
           format: 'table'
           hide-progress: true
           severity: 'HIGH,CRITICAL'
           exit-code: '1'
