name: security-scan
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read          # Required to checkout and read repo files
      security-events: write  # Required to upload SARIF files to Security tab
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: scan-image
        id: scan-image
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true # ← allow SARIF upload to still run
        with:
          image-ref: 'falcosecurity/falco'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
      - name: scan-manifest
        id: scan-manifest
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true # ← allow SARIF upload to still run
        with:
          scan-type: 'config'
          hide-progress: true
          format: 'sarif'
          output: 'trivy-man-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: Upload Trivy report scan image
        uses: github/codeql-action/upload-sarif@v4
        if: always()            # ← run even if scan step failed
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy-image
      - name: Upload Trivy report scan manifest
        uses: github/codeql-action/upload-sarif@v4
        if: always()            # ← run even if scan step failed
        with:
          sarif_file: 'trivy-man-results.sarif'
          category: trivy-manifest
      - name: Fail pipeline if vulnerabilities found  # ← now block the job
        if: steps.scan-image.outcome == 'failure' || steps.scan-manifest.outcome== 'failure'
        run: exit 1
