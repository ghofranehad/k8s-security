 apiVersion: v1
 kind: Pod
 metadata:
   name: test-compliant
   namespace: default
 spec:
   containers:
     - name: good
       image: nginx
       resources:
         limits:
           cpu: "100m"
           memory: "128Mi"
       securityContext:
         runAsNonRoot: true
         runAsUser: 1000
         privileged: false
         readOnlyRootFilesystem: true
