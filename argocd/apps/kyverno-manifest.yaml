apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: security-hardening
  source:
    repoURL: 'https://kyverno.github.io/kyverno/'
    chart:  kyverno
    targetRevision: 3.3.7
    helm:
        valueFiles:
          - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kyverno
  syncPolicy:
    prune: true
    automated: {}
    selfHeal: true
    syncOptions:
      - CreateNamespace=true