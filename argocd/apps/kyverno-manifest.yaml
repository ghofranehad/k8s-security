apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: security-hardening
  source:
    repoURL: 'https://kyverno.github.io/kyverno/'
    chart:  kyverno
    targetRevision: 3.3.7
    helm:
        valueFiles:
          - values.yaml
    values: |-
      cleanupController:
        enabled: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kyverno
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
