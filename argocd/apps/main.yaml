apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: applications
  namespace: argocd
spec:
  project: security-hardening
  sources:
    - repoURL: https://github.com/ghofranehad/k8s-security.git
      path: argocd/apps
      targetRevision: HEAD
      directory:
        recurse: true
    - repoURL: https://github.com/ghofranehad/k8s-security.git
      path: argocd/projects
      targetRevision: HEAD
      directory:
        recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
