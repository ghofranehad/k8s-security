# Violation test: block-root-containers
# Expected result with mutation enabled:  Pod RUNS — MutatingPolicy overrides runAsNonRoot to true
# Expected result with mutation disabled: Pod DENIED by block-root-containers ValidatingPolicy
#
# To test the Deny behavior, disable the mutation first:
#   kubectl delete mutatingpolicy add-default-securitycontext
#   kubectl apply -f tests/violations/root-container.yaml
#   # restore after test:
#   kubectl apply -f kyverno/policies/mutate/add-default-securitycontext.yaml
apiVersion: v1
kind: Pod
metadata:
  name: violation-root-container
  namespace: default
spec:
  containers:
  - name: test
    image: alpine:3.18
    command: ["sleep", "3600"]
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
