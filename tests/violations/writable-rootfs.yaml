# Violation test: require-readonly-rootfs
# Expected result with mutation enabled:  Pod RUNS — MutatingPolicy overrides readOnlyRootFilesystem to true
# Expected result with mutation disabled: Pod DENIED by require-readonly-rootfs ValidatingPolicy
#
# To test the Deny behavior, disable the mutation first:
#   kubectl delete mutatingpolicy add-default-securitycontext
#   kubectl apply -f tests/violations/writable-rootfs.yaml
#   # restore after test:
#   kubectl apply -f kyverno/policies/mutate/add-default-securitycontext.yaml
apiVersion: v1
kind: Pod
metadata:
  name: violation-writable-rootfs
  namespace: default
spec:
  containers:
  - name: test
    image: alpine:3.18
    command: ["sleep", "3600"]
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
