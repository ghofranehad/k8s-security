# Violation test: require-resource-limits
# Expected result with mutation enabled:  Pod RUNS — MutatingPolicy injects default resource limits
# Expected result with mutation disabled: Pod DENIED by require-resource-limits ValidatingPolicy
#
# To test the Deny behavior, disable the mutation first:
#   kubectl delete mutatingpolicy add-resource-limits
#   kubectl apply -f tests/violations/no-resource-limits.yaml
#   # restore after test:
#   kubectl apply -f kyverno/policies/mutate/add-resource-limits.yaml
apiVersion: v1
kind: Pod
metadata:
  name: violation-no-limits
  namespace: default
spec:
  containers:
  - name: test
    image: alpine:3.18
    command: ["sleep", "3600"]
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
