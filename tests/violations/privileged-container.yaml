# Violation test: block-privileged-containers
# Expected result with mutation enabled:  Pod RUNS — MutatingPolicy overrides privileged to false
# Expected result with mutation disabled: Pod DENIED by block-privileged-containers ValidatingPolicy
#
# To test the Deny behavior, disable the mutation first:
#   kubectl delete mutatingpolicy add-default-securitycontext
#   kubectl apply -f tests/violations/privileged-container.yaml
#   # restore after test:
#   kubectl apply -f kyverno/policies/mutate/add-default-securitycontext.yaml
apiVersion: v1
kind: Pod
metadata:
  name: violation-privileged
  namespace: default
spec:
  containers:
  - name: test
    image: alpine:3.18
    command: ["sleep", "3600"]
    securityContext:
      privileged: true
      runAsNonRoot: true
      runAsUser: 1000
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
