### add-default-securitycontext: inject runAsNonRoot, readOnlyRootFilesystem, allowPrivilegeEscalation=false when securityContext is missing ####
# capabilities.drop and seccompProfile are atomic fields in the Kubernetes API —
# they cannot be set via ApplyConfiguration (strategic merge patch).
# ApplyConfiguration handles non-atomic fields; JSONPatch handles atomic ones.
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: add-default-securitycontext
spec:
  matchConstraints:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: [kube-system, kube-public, kube-node-lease, argocd, kyverno,
                   falco, sealed-secrets, calico-system, calico-apiserver, tigera-operator]
    resourceRules:
      - apiGroups: ['']
        apiVersions: [v1]
        operations: [CREATE]
        resources: [pods]
  mutations:
    # Step 1: non-atomic fields — strategic merge patch is safe here
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: |
          Object{
            spec: Object.spec{
              securityContext: Object.spec.securityContext{
                seccompProfile: Object.spec.securityContext.seccompProfile{
                  type: "RuntimeDefault"
                }
              },
              containers: object.spec.containers.map(c, Object.spec.containers{
                name: c.name,
                securityContext: Object.spec.containers.securityContext{
                  runAsNonRoot: true,
                  readOnlyRootFilesystem: true,
                  allowPrivilegeEscalation: false,
                  privileged: false
                }
              })
            }
          }
    # Step 2: atomic fields — must use JSONPatch, runs after ApplyConfiguration
    - patchType: JSONPatch
      jsonPatch:
        expression: |
          lists.range(object.spec.containers.size()).map(i,
            JSONPatch{
              op: "add",
              path: "/spec/containers/" + string(i) + "/securityContext/capabilities",
              value: {"drop": ["ALL"]}
            }
          ) +
          lists.range(object.spec.containers.size()).map(i,
            JSONPatch{
              op: "add",
              path: "/spec/containers/" + string(i) + "/securityContext/seccompProfile",
              value: {"type": "RuntimeDefault"}
            }
          )
