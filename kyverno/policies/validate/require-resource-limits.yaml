# =============================================================================
# ValidatingPolicy — require-resource-limits
# =============================================================================
#
# ATTACK VECTOR:
#   A container without resource limits can consume unlimited CPU and memory,
#   crashing other pods on the same node (noisy neighbor / denial of service).
#   An attacker who compromises a pod can deliberately exhaust node resources
#   to disrupt the entire cluster.
#
# MITRE ATT&CK: T1499 — Endpoint Denial of Service
# CIS Benchmark: 5.2.4 — Minimize the admission of containers without resource limits
# =============================================================================

apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-resource-limits
spec:
  validationActions:
    - Audit
  matchConstraints:
    resourceRules:
      - apiGroups: ['']
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods]
  validations:
    - message: >-
        All containers must define CPU and memory limits.
        Add resources.limits.cpu and resources.limits.memory to each container.
      expression: >-
        object.spec.containers.all(c,
          has(c.resources) &&
          has(c.resources.limits) &&
          has(c.resources.limits.cpu) &&
          has(c.resources.limits.memory)
        ) &&
        object.spec.?initContainers.orValue([]).all(c,
          has(c.resources) &&
          has(c.resources.limits) &&
          has(c.resources.limits.cpu) &&
          has(c.resources.limits.memory)
        )
