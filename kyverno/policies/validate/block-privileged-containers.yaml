##### block-privileged-containers: deny privileged mode + require securityContext ####


apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: block-privileged-containers
spec:
  validationActions:
    - Audit
  matchConstraints:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: [kube-system, kube-public, kube-node-lease, argocd, kyverno,
                   falco, sealed-secrets, calico-system, calico-apiserver, tigera-operator]
    resourceRules:
      - apiGroups: ['']
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods]
  validations:
    - message: >-
        securityContext must be defined and privileged must not be true.
        Add securityContext to each container and remove privileged: true.
      expression: >-
        object.spec.containers.all(c,
          has(c.securityContext) &&
          (!has(c.securityContext.privileged) || c.securityContext.privileged == false)
        ) &&
        object.spec.?initContainers.orValue([]).all(c,
          has(c.securityContext) &&
          (!has(c.securityContext.privileged) || c.securityContext.privileged == false)
        )
